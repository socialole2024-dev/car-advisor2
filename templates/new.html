{% extends 'base.html' %}
{% block content %}
<div class="card" style="margin-top:20px;">
  <p class="page-title">Neue Beratung</p>
  <p class="page-sub">Link aus mobile.de, AutoScout24 oder Kleinanzeigen einf&#xFC;gen</p>
  <form method="POST">
    <label>Inserat-Link</label>
    <textarea name="url" id="urlInput" rows="3" placeholder="Link oder Text mit Link einf&#xFC;gen&#x2026;&#10;z.B. auch: Gerade bei Kleinanzeigen gefunden https://..." style="width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:inherit;outline:none;resize:none;margin-bottom:6px;" oninput="extractUrl(this)"></textarea>
    <div id="urlPreview" style="display:none;background:#f0f9f4;border:1.5px solid #059669;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;">
      <span style="color:#059669;font-weight:700;">&#x2713; Link erkannt:</span>
      <span id="urlPreviewText" style="color:#1a1a1a;word-break:break-all;"></span>
    </div>
    <button type="submit" class="btn btn-primary">Analyse starten &#x2192;</button>
  </form>
  <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Abbrechen</a>
</div>
<script>
function extractUrl(el) {
  var text = el.value;
  var match = text.match(/https?:\/\/[^\s'"<>]+/);
  var preview = document.getElementById('urlPreview');
  var previewText = document.getElementById('urlPreviewText');
  if (match && match[0] !== text.trim()) {
    previewText.textContent = match[0];
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}
</script>
{% endblock %}
