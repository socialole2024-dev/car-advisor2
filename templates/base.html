<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Advisor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 16px; min-height: 100vh; }
header { background: #1a1a1a; color: #fff; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 17px; font-weight: 600; }
header nav a { color: #aaa; text-decoration: none; font-size: 14px; margin-left: 16px; }
header nav a:hover { color: #fff; }
.container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.btn { display: inline-block; padding: 12px 24px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; text-align: center; width: 100%; }
.btn-primary { background: #1a1a1a; color: #fff; }
.btn-primary:hover { background: #333; }
.btn-secondary { background: #f0f0f0; color: #1a1a1a; margin-top: 10px; }
input[type=email], input[type=password], input[type=url] { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; margin-bottom: 12px; }
input:focus { border-color: #1a1a1a; }
label { font-size: 13px; font-weight: 600; color: #666; display: block; margin-bottom: 5px; }
.flash { background: #FEE2E2; color: #991B1B; padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-bottom: 14px; }
.empty { text-align: center; padding: 40px 20px; color: #888; }
.advice-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
.advice-item:last-child { border-bottom: none; }
.advice-url { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
.advice-title { font-weight: 600; font-size: 15px; }
.badge { background: #DBEAFE; color: #1E40AF; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; white-space: nowrap; }
.page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.page-sub { font-size: 14px; color: #888; margin-bottom: 20px; }
.divider { text-align: center; font-size: 13px; color: #aaa; margin: 14px 0; }
</style>
</head>
<body>
<header>
  <h1>&#x1F697; Car Advisor</h1>
  <nav>
    {% if current_user.is_authenticated %}
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    {% else %}
      <a href="{{ url_for('login') }}">Login</a>
      <a href="{{ url_for('register') }}">Registrieren</a>
    {% endif %}
  </nav>
</header>
<div class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}{% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
